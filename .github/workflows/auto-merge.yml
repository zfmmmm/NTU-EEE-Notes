name: 自动合并

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    # 第一道防线：只有修改了 blog 目录才触发（节省服务器资源）
    paths:
      - 'src/data/blog/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  secure-merge:
    runs-on: ubuntu-latest
    steps:
      - name: 路径安全审计
        uses: actions/github-script@v6
        with:
          script: |
            // 1. 获取 PR 修改的所有文件
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            // 2. 定义允许修改的白名单路径
            const allowedPath = 'src/data/blog/';
            
            // 3. 检查是否有文件越界
            const forbiddenFiles = files.filter(file => !file.filename.startsWith(allowedPath));

            if (forbiddenFiles.length > 0) {
              const fileList = forbiddenFiles.map(f => f.filename).join(', ');
              core.setFailed(`❌ 安全拦截：PR 修改了非法路径 [${fileList}]。自动合并已取消。`);
              
              // 可选：在 PR 下留言提醒
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `⚠️ **自动合并被拒绝**：你修改了权限范围外的文件：\`${fileList}\`。本项目仅允许通过此方式修改博客内容。`
              });
              return;
            }

            // 4. 如果审计通过，执行合并
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              merge_method: 'squash'
            });
            console.log("✅ 审计通过，已完成自动合并。");